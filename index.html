<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Movie Trivia</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Movie Trivia Challenge</h1>

<div id="menu">

<h2>Select Difficulty</h2>

<button onclick="startGame('easy')">Easy</button>
<button onclick="startGame('medium')">Medium</button>
<button onclick="startGame('hard')">Hard</button>
<button onclick="startGame('insane')">Insane</button>

<button class="kevin" onclick="startGame('kevin')">
KEVIN MODE
</button>

</div>


<div id="game" class="hidden">

<div id="hud">
Score: <span id="score">0</span> |
Question: <span id="qnum">1</span>
</div>

<div id="question"></div>

<div id="choices"></div>

<div id="answer" class="hidden"></div>

<button id="actionButton" onclick="handleAction()">
Reveal Question
</button>

</div>

<script src="questions.js"></script>
<script src="app.js"></script>

</body>
</html>
